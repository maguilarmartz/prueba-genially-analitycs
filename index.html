<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cargando recurso...</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0MQMF0S4CR"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-0MQMF0S4CR');
</script>

<style>
body{
margin:0;
}

iframe{
width:100%;
height:100vh;
border:none;
}
</style>

</head>

<body>

<iframe id="geniallyFrame"></iframe>

<script>

// obtener parámetros de la URL
const params = new URLSearchParams(window.location.search);
const geniallyURL = params.get("genially");

// cargar genially
if(geniallyURL){
document.getElementById("geniallyFrame").src = geniallyURL;

// usar el nombre del genially como título
const parts = geniallyURL.split("/");
const slug = parts[parts.length-1];
const title = slug.replace(/-/g," ");

document.title = title;
}

</script>

</body>
</html>
